<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="popup.css"></link>
</head>
<body>
    <div id="header">
        <div class="logo">
            <img id="icon" src="icon-96.png"/>
            <h1 id="title">Focus Timer</h1>
        </div>

        <p class="label-blue">Focusing</p>
    </div>

    <div id="timer-container">
        <p class="label">TIME REMAINING</p>
        <p id="timer">00:00</h1>
        <progress id="file"></progress>
    </div>

    <div class="btn-container">
        <button class="btn btn-outline" id="reset-timer-btn">Reset</button>
        <button class="btn btn-blue" id="start-timer-btn">Start</button>
        <button class="btn btn-outline" id="add-task-btn">+ Task</button>
    </div>

    <div id="tasklist-header">
        <p class="label" id="tasklist-text">TASKLIST</p>
        <button class="btn-label-gray" id="btn-clear">Clear</button>
    </div>

    <div id="empty-status-container"></div>
    <div id="task-container">
        <!-- <input class="input" placeholder="Enter task name"/>
        <button class="btn">Done</button> -->
    </div>
</body>
<script src="popup.js"></script>
</html>
