<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <link rel="stylesheet" href="popup.css"></link>
</head>
<body>
    <div id="header">
        <img id="icon" src="icon-96.png"/>
        <h1 id="title">Focus Timer</h1>
    </div>

    <p id="timer">00:00</h1>

    <div class="btn-container">
        <button class="btn" id="reset-timer-btn">Reset timer</button>
        <button class="btn" id="start-timer-btn">Start timer</button>
        <button class="btn" id="add-task-btn">Add task</button>
    </div>

    <h2 class="subheader">Tasklist:</h2>
    <div id="empty-status-container"></div>
    <div id="task-container">
        <!-- <input class="input" placeholder="Enter task name"/>
        <button class="btn">Done</button> -->
    </div>
</body>
<script src="popup.js"></script>
</html>
