<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer Options</title>
    <link rel="stylesheet" href="options.css"/>
</head>
<body>
    <h1 id="title">Focus Timer Options</h1>
    <div class="input-container">
        <p class="label">Enter a default time (min) between 1 and 60:</p>
        <input id="timer-option" class="input" type="number" min="1" max="60" value="25"/>
    </div>
    <button id="save-btn" class="btn">Save options</button>
    <div id="status-msg-container"></div>
</body>
<script src="options.js"></script>
</html>
